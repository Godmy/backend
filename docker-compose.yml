name: vibe-management-pro-backend

services:
  db:
    image: postgres:15
    container_name: vibe_management_pro_backend_db
    environment:
      POSTGRES_DB: vibe_management
      POSTGRES_USER: vibe_management_user
      POSTGRES_PASSWORD: vibe_management_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vibe_management_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vibe_management_user -d vibe_management"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vibe_management_pro_backend_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - vibe_management_network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  app:
    build: .
    container_name: vibe_management_pro_backend_app
    environment:
      DATABASE_URL: postgresql://vibe_management_user:vibe_management_password@db:5432/vibe_management
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vibe_management
      DB_USER: vibe_management_user
      DB_PASSWORD: vibe_management_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Database initialization
      SEED_DATABASE: "false"  # Disable auto-seeding in production
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibe_management_network
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    restart: unless-stopped

  celery_worker:
    build: .
    container_name: vibe_management_pro_backend_celery_worker
    environment:
      DATABASE_URL: postgresql://vibe_management_user:vibe_management_password@db:5432/vibe_management
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vibe_management
      DB_USER: vibe_management_user
      DB_PASSWORD: vibe_management_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      CELERY_WORKER_CONCURRENCY: "4"
      CELERY_WORKER_MAX_TASKS_PER_CHILD: "1000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibe_management_network
    volumes:
      - ./uploads:/app/uploads
    restart: unless-stopped
    command: celery -A workers.celery_worker worker --loglevel=info --concurrency=4

  celery_beat:
    build: .
    container_name: vibe_management_pro_backend_celery_beat
    environment:
      DATABASE_URL: postgresql://vibe_management_user:vibe_management_password@db:5432/vibe_management
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: vibe_management
      DB_USER: vibe_management_user
      DB_PASSWORD: vibe_management_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - vibe_management_network
    restart: unless-stopped
    command: celery -A workers.celery_worker beat --loglevel=info

volumes:
  postgres_data:
  redis_data:

networks:
  vibe_management_network:
    driver: bridge
